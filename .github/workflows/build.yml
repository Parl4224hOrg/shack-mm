name: Build and Deploy shack-mm

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ghcr.io/parl4224horg/shack-mm:sha-${{ github.sha }}
            ghcr.io/parl4224horg/shack-mm:master

      - name: Trigger production deploy
        run: |
          curl --fail-with-body --silent --show-error -X POST \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_DISPATCH_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Parl4224h/CLVR.Deploy/dispatches \
            -d '{
              "event_type": "deploy",
              "client_payload": {
                "target": "shack-mm",
                "tag": "sha-${{ github.sha }}",
                "source_repo": "${{ github.repository }}"
              }
            }'